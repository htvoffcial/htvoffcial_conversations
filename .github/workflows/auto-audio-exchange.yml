name: Daily Gymnastics Brother TTS

on:
  schedule:
    # 日本時間 4:20 は UTC 19:20
    - cron: '20 19 * * *'
  workflow_dispatch:

jobs:
  generate-tts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Conversations Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install edge-tts

      - name: Extract Text and Generate Speech
        run: |
          # 1. 元のMarkdownを取得
          curl -s https://raw.githubusercontent.com/htvoffcial/htvoffcial/main/DiscussArchive.md > archive.md
          
          # 2. Pythonで最新の「体操のお兄さん」セクションを抽出
          TEXT=$(python3 -c "
          import re
          try:
              content = open('archive.md').read()
              # 全体から「体操のお兄さん」のリンクと、その次の行の説明文をすべて探す
              matches = re.findall(r'\[体操のお兄さん.*?\]\(.*?\)\s*\n\s*-\s*(.*)', content)
              if matches:
                  # 一番最後（最新）のものを取得
                  text = matches[-1].strip()
                  text = text.replace('“…”', '').replace('...', '')
                  print(text)
              else:
                  print('今日もお疲れ様！体操のお兄さんだよ。')
          except:
              print('今日もお疲れ様！体操のお兄さんだよ。')
          ")
          echo "Target Text: $TEXT"

          # 3. 音声生成 (エスケープを削除してシンプルに記述)
          edge-tts --voice ja-JP-KeitaNeural --text "$TEXT" --write-media today.wav
          
          # 4. アーカイブ用ディレクトリ作成とコピー
          DIR="Archives/$(date +%Y-%m)"
          mkdir -p "$DIR"
          ARCHIVE_PATH="$DIR/$(date +%d).mp3"
          cp today.wav "$ARCHIVE_PATH"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add today.wav Archives/
          git commit -m "Add daily speech for $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push
