name: Daily Gymnastics Brother TTS

on:
  schedule:
    # 日本時間 4:20 は UTC 19:20
    - cron: '20 19 * * *'
  workflow_dispatch:

jobs:
  generate-tts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Conversations Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install edge-tts

      - name: Extract Text and Generate Speech
        run: |
          # 1. htvoffcial/htvoffcial の README.md を取得
          curl -s https://raw.githubusercontent.com/htvoffcial/htvoffcial/main/README.md > readme.md
          
          # 2. コメントタグの間のテキストを抽出
          # re.DOTALL を使うことで、改行を含む複数行をマッチさせます
          TEXT=$(python3 -c "
          import re
          try:
              content = open('readme.md').read()
              # <!-- DISCUSS_COACH_START --> と <!-- DISCUSS_COACH_END --> の間を抽出
              pattern = r'<!-- DISCUSS_COACH_START -->(.*?)<!-- DISCUSS_COACH_END -->'
              match = re.search(pattern, content, re.DOTALL)
              if match:
                  text = match.group(1).strip()
                  # Markdownの記号（## や ** など）を読み上げ用に簡易除去
                  text = re.sub(r'#+\s*', '', text) # 見出し記号
                  text = text.replace('**', '')    # 太字記号
                  print(text)
              else:
                  print('今日もお疲れ様！体操のお兄さんだよ。')
          except:
              print('今日もお疲れ様！体操のお兄さんだよ。')
          ")
          echo "Target Text: $TEXT"

          # 3. 音声生成
          edge-tts --voice ja-JP-KeitaNeural --text "$TEXT" --write-media today.wav
          
          # 4. アーカイブ用ディレクトリ作成とコピー
          DIR="Archives/$(date +%Y-%m)"
          mkdir -p "$DIR"
          ARCHIVE_PATH="$DIR/$(date +%d).mp3"
          cp today.wav "$ARCHIVE_PATH"

      # ... (前半の steps は同じ)

      - name: Generate Speech and Convert to HLS
        run: |
          # 1. README.md からテキスト抽出 (前述と同じ)
          curl -s https://raw.githubusercontent.com/htvoffcial/htvoffcial/main/README.md > readme.md
          TEXT=$(python3 -c "
          import re
          try:
              content = open('readme.md').read()
              pattern = r'<!-- DISCUSS_COACH_START -->(.*?)<!-- DISCUSS_COACH_END -->'
              match = re.search(pattern, content, re.DOTALL)
              if match:
                  text = match.group(1).strip()
                  text = re.sub(r'#+\s*', '', text)
                  text = text.replace('**', '')
                  print(text)
              else:
                  print('今日もお疲れ様！')
          except:
              print('今日もお疲れ様！')
          ")

          # 2. 一旦 mp3 を生成
          edge-tts --voice ja-JP-KeitaNeural --text "$TEXT" --write-media temp.mp3

          # 3. ffmpeg で HLS (m3u8) に変換
          # -hls_time 10: 各セグメントを約10秒に分割
          # -hls_list_size 0: すべてのセグメントをプレイリストに含める
          mkdir -p stream
          ffmpeg -i temp.mp3 \
            -codec:a aac -b:a 128k \
            -map 0:a \
            -f hls \
            -hls_time 10 \
            -hls_list_size 0 \
            -hls_segment_filename "stream/data%03d.ts" \
            stream/playlist.m3u8

          # 4. アーカイブ用 (今まで通り)
          DIR="Archives/$(date +%Y-%m)"
          mkdir -p "$DIR"
          cp temp.mp3 "$DIR/$(date +%d).mp3"
          # 便宜上、ルートの today.wav も残すなら
          cp temp.mp3 today.wav

      - name: Commit and Push
        run: |
          git config --global user.name "Whooo"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stream/ today.wav Archives/
          git commit -m "Update HLS stream and archives $(date +%Y-%m-%d)" || echo "No changes"
          git push
