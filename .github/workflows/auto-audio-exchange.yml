name: Daily Gymnastics Brother TTS

on:
  schedule:
    # 日本時間 4:20 は UTC 19:20
    - cron: '20 19 * * *'
  workflow_dispatch:
    # 手動実行ボタンを有効化

jobs:
  generate-tts:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 書き込み権限を明示的に付与
    steps:
      - name: Checkout Conversations Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install edge-tts

      - name: Extract Text and Generate Speech
        run: |
          # 1. 元のMarkdownを取得
          curl -s https://raw.githubusercontent.com/htvoffcial/htvoffcial/main/DiscussArchive.md > archive.md
          
          # 2. Pythonでテキスト抽出 (「体操のお兄さん」の次の行を抽出)
          TEXT=$(python3 -c "
          import re
          import sys
          try:
              content = open('archive.md').read()
              # '体操のお兄さん' を含むリスト項目を探す
              # 例: - [体操のお兄さん...](...)\n  - (抽出したいテキスト)
              match = re.search(r'\[体操のお兄さん.*?\]\(.*?\)\s*\n\s*-\s*(.*)', content)
              if match:
                  text = match.group(1).strip()
                  # 不要な文字を除去
                  text = text.replace('“…”', '').replace('...', '')
                  print(text)
              else:
                  print('今日もお疲れ様！体操のお兄さんだよ。')
          except Exception as e:
              print('今日もお疲れ様！体操のお兄さんだよ。')
          ")
          echo "Target Text: $TEXT"

          # 3. 音声生成 (edge-tts)
          # today.wav
          edge-tts --voice ja-JP-KeitaNeural --text \"$TEXT\" --write-media today.wav
          
          # アーカイブ用
          DIR=\"Archives/$(date +%Y-%m)\"
          mkdir -p \"$DIR\"
          ARCHIVE_PATH=\"$DIR/$(date +%d).mp3\"
          cp today.wav \"$ARCHIVE_PATH\"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add today.wav Archives/
          git commit -m "Add daily speech for $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push
