name: Daily Gymnastics Brother TTS

on:
  schedule:
    # 日本時間 4:20 は UTC 19:20
    - cron: '20 19 * * *'
  workflow_dispatch:

jobs:
  generate-tts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Conversations Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install edge-tts

      - name: Generate Speech and Convert to HLS
        run: |
          # 1. README.md からテキスト抽出
          curl -s https://raw.githubusercontent.com/htvoffcial/htvoffcial/main/README.md > readme.md
          TEXT=$(python3 -c "
          import re
          try:
              content = open('readme.md').read()
              pattern = r'<!-- DISCUSS_COACH_START -->(.*?)<!-- DISCUSS_COACH_END -->'
              match = re.search(pattern, content, re.DOTALL)
              if match:
                  text = match.group(1).strip()
                  # 不要な装飾を除去
                  text = re.sub(r'#+\s*', '', text)
                  text = text.replace('**', '')
                  print(text)
              else:
                  print('今日もお疲れ様！体操のお兄さんだよ。')
          except:
              print('今日もお疲れ様！')
          ")
          echo "Target Text: $TEXT"

          # 2. 高音質MP3を生成
          edge-tts --voice ja-JP-KeitaNeural --text "$TEXT" --write-media latest.mp3

          # 3. ffmpeg で HLS (m3u8) に変換
          mkdir -p docs/stream
          ffmpeg -y -i latest.mp3 \
            -codec:a aac -b:a 128k \
            -f hls \
            -hls_time 10 \
            -hls_list_size 0 \
            -hls_segment_filename "docs/stream/data%03d.ts" \
            docs/stream/playlist.m3u8

          # 4. アーカイブ作成
          DIR="Archives/$(date +%Y-%m)"
          mkdir -p "$DIR"
          cp latest.mp3 "$DIR/$(date +%d).mp3"

      - name: Commit and Push
        run: |
          git config --global user.name "RAdi0Bot♪"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/stream latest.mp3 Archives/
          git commit -m "Update HLS stream and archives $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push
